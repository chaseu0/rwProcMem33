name: NDK Demo Build

on:
  workflow_dispatch:
    inputs:
      target:
        description: "Build target name or 'all'"
        required: true
        default: all
        type: choice
        options:
          - all
          - testKo
          - testTarget
          - testMemSearch
          - testDumpMem
          - testCEServer
          - testHwBp
          - testHwBpTarget
          - testHwBpServer
      ref:
        description: "Git ref to build"
        required: true
        default: master
        type: string
      ndk_package:
        description: "Android SDK manager NDK package version"
        required: true
        default: "26.3.11579264"
        type: string

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  group: ndk-demo-build-${{ github.event.inputs.target || 'all' }}-${{ github.event.inputs.ref || github.ref_name }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-24.04
    timeout-minutes: 90

    steps:
      - name: Checkout requested ref
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Prepare artifacts root
        run: mkdir -p "${GITHUB_WORKSPACE}/artifacts"

      - name: Install Android NDK
        env:
          NDK_PACKAGE: ${{ inputs.ndk_package }}
        run: |
          set -euxo pipefail
          sdkmanager "ndk;${NDK_PACKAGE}"
          echo "ANDROID_NDK_ROOT=${ANDROID_SDK_ROOT}/ndk/${NDK_PACKAGE}" >> "${GITHUB_ENV}"
          echo "${ANDROID_SDK_ROOT}/ndk/${NDK_PACKAGE}" >> "${GITHUB_PATH}"
          test -x "${ANDROID_SDK_ROOT}/ndk/${NDK_PACKAGE}/ndk-build"

      - name: Build requested NDK target(s)
        env:
          ARTIFACTS_DIR: ${{ github.workspace }}/artifacts
          JOBS: "4"
          NDK_BUILD_BIN: ${{ env.ANDROID_NDK_ROOT }}/ndk-build
          TARGET_NAME: ${{ inputs.target }}
        run: |
          set -euxo pipefail
          chmod +x tools/build_ndk_targets.sh
          tools/build_ndk_targets.sh "${TARGET_NAME}"

      - name: Upload build artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ndk-demo-build-${{ inputs.target }}-${{ github.run_number }}
          path: ${{ github.workspace }}/artifacts
          if-no-files-found: warn
